<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>照明器具 自動OCR紹介記号チェッカー</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#050505;color:#fff}
header{height:48px;display:flex;align-items:center;justify-content:center;background:#0b0b0b;font-weight:900;font-size:16px;position:sticky;top:0;z-index:5}
.topResult{position:sticky;top:48px;z-index:4;margin:10px;border-radius:18px;padding:12px;text-align:center;background:#101923;border:2px solid #24394f}
.state{font-size:13px;color:#ff6666;font-weight:900}.symbol{font-size:54px;font-weight:1000;line-height:1;margin:8px 0}.model{font-size:13px;color:#d0d0d0}
.cameraWrap{position:relative;margin:10px;border-radius:18px;overflow:hidden;background:#000;border:2px solid #24f08a}
video{display:block;width:100%;height:42vh;object-fit:cover;background:#000}
#scanFrame{position:absolute;left:4%;right:4%;top:35%;height:24%;border:3px solid #23ff8f;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.28);pointer-events:none}
#scanLine{position:absolute;left:4%;right:4%;top:47%;height:2px;background:#23ff8f;box-shadow:0 0 12px #23ff8f}
#guideText{position:absolute;left:0;right:0;top:27%;text-align:center;color:#fff;font-weight:900;text-shadow:0 2px 6px #000}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px}button{border:0;border-radius:14px;padding:14px;color:#fff;font-size:16px;font-weight:900}
.blue{background:#1263d8}.black{background:#111}.red{background:#a91717}.gray{background:#444}.green{background:#008a3d}.wide{grid-column:1/-1}
.card{background:#111;border:1px solid #333;border-radius:16px;margin:10px;padding:12px}input{width:100%;border:1px solid #333;border-radius:12px;background:#fff;color:#111;padding:12px;font-size:18px}
.small{font-size:13px;color:#bdbdbd;line-height:1.5}.raw{white-space:pre-wrap;background:#080808;border-radius:12px;padding:10px;max-height:120px;overflow:auto;font-size:12px;color:#ccc}
canvas{display:none;width:100%;background:#fff;border-radius:12px;margin-top:8px}table{width:100%;border-collapse:collapse;font-size:13px;color:#ddd}td,th{border-bottom:1px solid #333;padding:7px 4px;text-align:left}
</style></head>
<body>
<header>照明器具 自動OCR紹介記号チェッカー</header>
<section class="topResult" id="resultBox"><div class="state">未登録または読取失敗</div><div class="symbol">---</div><div class="model">候補：- / 一致率 0%</div></section>
<section class="cameraWrap"><video id="video" playsinline muted></video><div id="guideText">型番だけを横長枠いっぱいに入れる</div><div id="scanFrame"></div><div id="scanLine"></div></section>
<div class="buttons"><button class="blue" onclick="startAuto()">カメラ起動＋自動読取</button><button class="red" onclick="stopAll()">停止</button><button class="gray" onclick="readOnce()">1回だけ読取</button><button class="black" onclick="toggleLight()">ライト切替</button></div>
<section class="card"><b>手入力確認</b><input id="manual" placeholder="例：NNFB84665"><button class="blue wide" onclick="manualSearch()">検索</button></section>
<section class="card"><b>CSVデータ読込</b><div class="small">列名：型番, 紹介記号, 設置場所, 回路, 備考</div><input type="file" accept=".csv,text/csv" onchange="loadCsv(event)"></section>
<section class="card"><b>状態</b><div id="status" class="small">待機中</div></section>
<section class="card"><b>読取文字</b><div id="raw" class="raw">未読取</div><canvas id="work"></canvas></section>
<section class="card"><b>登録データ</b><div id="count" class="small"></div><div id="table"></div></section>
<script>
let data=[{model:"NNFB84665",symbol:"A1",place:"",circuit:""},{model:"NNFB84695",symbol:"A2",place:"",circuit:""},{model:"XLX450NENP LE9",symbol:"A-12",place:"3F 廊下",circuit:"L-3"}];
let stream=null,worker=null,timer=null,busy=false,torch=false,last="",stable=0;
const INTERVAL=900,TARGET_W=1100,NEED_STABLE=1;
function n(s){return(s||"").toUpperCase().replace(/[ＯO]/g,"0").replace(/[ＩIＬ]/g,"1").replace(/[Ｓ]/g,"5").replace(/[Ｂ]/g,"8").replace(/[　\s_.,:;|/\\()[\]{}]+/g,"").replace(/[^A-Z0-9\-]/g,"").trim()}
function sim(a,b){a=n(a);b=n(b);let m=a.length,l=b.length;if(!m||!l)return 0;let d=Array.from({length:m+1},()=>Array(l+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=l;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=l;j++){let c=a[i-1]==b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c)}return 1-d[m][l]/Math.max(m,l)}
function match(text){let joined=n(text);for(const r of data){let m=n(r.model);if(joined.includes(m)||m.includes(joined))return{hit:r,cand:r.model,score:1}}let best={hit:null,cand:joined,score:0};let chunks=[joined,...(joined.match(/[A-Z]{1,}[A-Z0-9\-]{4,}/g)||[])];for(const r of data){let m=n(r.model);for(const c of chunks){if(c.length<5)continue;let s=sim(c,m);if(s>best.score)best={hit:r,cand:c,score:s}}}if(best.score>=0.72)return best;return{hit:null,cand:joined,score:best.score}}
async function ensureWorker(){if(worker)return worker;setStatus("OCR準備中...");worker=await Tesseract.createWorker("eng",1);await worker.setParameters({tessedit_char_whitelist:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- ",tessedit_pageseg_mode:"7",preserve_interword_spaces:"0"});setStatus("OCR準備完了");return worker}
async function startAuto(){await startCam();if(timer)clearInterval(timer);timer=setInterval(readOnce,INTERVAL);readOnce()}
async function startCam(){const v=document.getElementById("video");if(stream)return;stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}},audio:false});v.srcObject=stream;await v.play();await ensureWorker();setStatus("自動読取中：型番だけを横長枠に入れてください")}
function stopAll(){if(timer)clearInterval(timer);timer=null;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}document.getElementById("video").srcObject=null;setStatus("停止中")}
async function toggleLight(){if(!stream)return alert("先にカメラ起動");const track=stream.getVideoTracks()[0];const cap=track.getCapabilities?.();if(!cap||!cap.torch)return alert("この端末/ブラウザはライト制御非対応です");torch=!torch;await track.applyConstraints({advanced:[{torch}]})}
function crop(){const v=document.getElementById("video");if(!v.videoWidth)return null;let sw=v.videoWidth*.92,sh=v.videoHeight*.24,sx=v.videoWidth*.04,sy=v.videoHeight*.35;let scale=TARGET_W/sw,cw=TARGET_W,ch=Math.max(130,Math.floor(sh*scale));const c=document.getElementById("work");c.width=cw;c.height=ch;const ctx=c.getContext("2d",{willReadFrequently:true});ctx.drawImage(v,sx,sy,sw,sh,0,0,cw,ch);preprocess(c);return c}
function preprocess(c){const ctx=c.getContext("2d",{willReadFrequently:true});const img=ctx.getImageData(0,0,c.width,c.height),d=img.data;let sum=0;for(let i=0;i<d.length;i+=4){let g=.299*d[i]+.587*d[i+1]+.114*d[i+2];g=(g-128)*1.9+128;g=Math.max(0,Math.min(255,g));sum+=g;d[i]=d[i+1]=d[i+2]=g}let avg=sum/(d.length/4),th=Math.max(95,Math.min(185,avg*.94));for(let i=0;i<d.length;i+=4){let v=d[i]>th?255:0;d[i]=d[i+1]=d[i+2]=v}ctx.putImageData(img,0,0)}
async function readOnce(){if(busy||!stream)return;busy=true;try{const c=crop();if(!c)return;const w=await ensureWorker();const r=await w.recognize(c);const text=r.data.text||"";const m=match(text);document.getElementById("raw").textContent="OCR文字:\n"+text+"\n候補:"+m.cand+"\n一致率:"+Math.round(m.score*100)+"%";if(m.hit){let id=n(m.hit.model);stable=(id===last)?stable+1:1;last=id;if(stable>=NEED_STABLE)show(m.hit,m.score,true)}else{stable=0;last="";show(null,m.score,false,m.cand)}}catch(e){setStatus("OCRエラー："+e.message)}finally{busy=false}}
function show(hit,score,ok,cand){const box=document.getElementById("resultBox");if(hit){box.innerHTML='<div class="state" style="color:#30ff91">照合一致</div><div class="symbol" style="color:#30ff91">'+esc(hit.symbol)+'</div><div class="model">型番：'+esc(hit.model)+' / 一致率 '+Math.round(score*100)+'%</div>';setStatus(hit.model+" → "+hit.symbol);if(navigator.vibrate)navigator.vibrate(50)}else{box.innerHTML='<div class="state">未登録または読取失敗</div><div class="symbol">---</div><div class="model">候補：'+esc(cand||"-")+' / 一致率 '+Math.round(score*100)+'%</div>'}}
function manualSearch(){let m=match(document.getElementById("manual").value);show(m.hit,m.score,!!m.hit,m.cand)}
function setStatus(s){document.getElementById("status").textContent=s}
function loadCsv(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const rows=parseCsv(r.result);if(rows.length){data=rows;render();alert(rows.length+"件読み込み")}else alert("CSV読込失敗")};r.readAsText(f,"utf-8")}
function parseCsv(t){const lines=t.replace(/\r/g,"").split("\n").filter(x=>x.trim());if(lines.length<2)return[];const h=split(lines[0]).map(x=>x.trim());return lines.slice(1).map(line=>{const c=split(line),row={};h.forEach((k,i)=>row[k]=c[i]||"");return{model:row["型番"]||row["model"]||row["器具型番"]||"",symbol:row["紹介記号"]||row["symbol"]||row["記号"]||"",place:row["設置場所"]||"",circuit:row["回路"]||""}}).filter(r=>r.model&&r.symbol)}
function split(line){let out=[],cur="",q=false;for(let i=0;i<line.length;i++){let c=line[i],nx=line[i+1];if(c=='"'&&q&&nx=='"'){cur+='"';i++}else if(c=='"')q=!q;else if(c==","&&!q){out.push(cur);cur=""}else cur+=c}out.push(cur);return out}
function render(){document.getElementById("count").textContent=data.length+"件登録中";document.getElementById("table").innerHTML="<table><tr><th>型番</th><th>記号</th></tr>"+data.map(r=>"<tr><td>"+esc(r.model)+"</td><td><b>"+esc(r.symbol)+"</b></td></tr>").join("")+"</table>"}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
render();
</script>
</body></html>
