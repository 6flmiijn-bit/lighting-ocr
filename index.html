<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>照明器具 自動OCR照会記号チェッカー</title><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><style>
*{box-sizing:border-box}body{margin:0;background:#050505;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}header{height:48px;background:#090909;display:flex;justify-content:center;align-items:center;font-weight:900;font-size:16px;position:sticky;top:0;z-index:20;border-bottom:1px solid #222}.helpBtn{position:absolute;right:8px;top:8px;background:#111;color:#fff;border:1px solid #555;border-radius:10px;padding:7px 10px}.wrap{padding:10px;max-width:780px;margin:auto}.mode{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}button{border:0;border-radius:12px;padding:13px 8px;color:#fff;font-size:17px;font-weight:900}.mode button{background:#111;border:1px solid #333}.mode .on{background:#0967dc}.cam{position:relative;background:#000;border:2px solid #19d46b;border-radius:14px;overflow:hidden}video{width:100%;height:31vh;object-fit:cover;background:#000;display:block}.h,.v{position:absolute;background:#8cff95;box-shadow:0 0 8px #58ff7b}.h{top:50%;left:0;right:0;height:1px}.v{left:50%;top:0;bottom:0;width:1px}.cor{position:absolute;width:36px;height:36px;border-color:#fff}.c1{left:18px;top:18px;border-left:4px solid;border-top:4px solid}.c2{right:18px;top:18px;border-right:4px solid;border-top:4px solid}.c3{left:18px;bottom:18px;border-left:4px solid;border-bottom:4px solid}.c4{right:18px;bottom:18px;border-right:4px solid;border-bottom:4px solid}.guide{position:absolute;left:10%;right:10%;bottom:16px;background:rgba(0,0,0,.65);border-radius:999px;padding:6px;text-align:center;font-weight:900}.res{display:grid;grid-template-columns:1fr 108px;gap:8px;border:2px solid #24405d;border-radius:14px;background:linear-gradient(#0d1824,#07111b);padding:14px;margin:8px 0}.state{color:#35ff91;font-weight:900;font-size:19px}.sym{font-size:66px;font-weight:1000;line-height:1}.meta{font-size:18px;line-height:1.5}.rulecard{border:2px solid currentColor;border-radius:12px;height:108px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111;font-weight:900}.rulecard .key{font-size:42px}.rulecard .name{font-size:17px}.actions{display:grid;grid-template-columns:1fr 1.8fr .7fr;gap:8px;margin:8px 0}.blue{background:#0967dc}.green{background:#069a36}.red{background:#a91414}.black{background:#111;border:1px solid #333}.status{display:flex;gap:8px;align-items:center;color:#ccc;font-size:14px}.dot{width:13px;height:13px;background:#0bd553;border-radius:50%}.head{display:flex;justify-content:space-between;align-items:center;background:#101010;border:1px solid #333;border-radius:12px;padding:10px;margin-top:8px}.head h3{font-size:20px;margin:0}.date{border:1px solid #1e4268;border-radius:12px;overflow:hidden;margin-top:8px;background:#080808}.dt{background:#07325c;padding:10px 12px;font-size:20px;font-weight:900;display:flex;justify-content:space-between}.item{display:grid;grid-template-columns:1.4fr 1.1fr 1.8fr .55fr;align-items:center;min-height:60px;border-top:1px solid #333}.item>div{padding:7px;border-left:1px solid #222}.item>div:first-child{border-left:0}.isym{font-size:34px;font-weight:1000}.irule{font-size:21px;font-weight:900}.qty{display:grid;grid-template-columns:42px 42px 48px 42px 42px;gap:4px;align-items:center;justify-content:center}.q{padding:7px 0;border-radius:7px;background:#111;border:1px solid #333;font-size:17px}.minus{color:#ff3333;border-color:#8a2222}.plus{color:#248dff;border-color:#1e5a9f}.num{font-size:26px;font-weight:900;text-align:center}.lock{font-size:23px;padding:8px;background:#111;border:1px solid #666}.locked{color:#ffd400;border-color:#ffd400}.foot{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.card{background:#101010;border:1px solid #333;border-radius:14px;padding:12px;margin-top:10px}.raw{white-space:pre-wrap;background:#080808;border-radius:10px;padding:8px;max-height:92px;overflow:auto;font-size:12px;color:#bbb}.tiger{background:repeating-linear-gradient(135deg,#ffd400 0 12px,#000 12px 24px);color:#000!important;text-shadow:0 1px 0 #fff;border-radius:8px;padding:5px 6px;font-weight:1000;display:inline-block}.drawer{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:50;display:none}.inner{position:absolute;right:0;top:0;bottom:0;width:min(430px,96vw);background:#101010;border-left:1px solid #333;overflow:auto;padding:14px}input{width:100%;border:0;border-radius:10px;background:#fff;color:#111;padding:10px;font-size:16px;margin:4px 0}.rules{display:grid;grid-template-columns:1fr 1fr;gap:8px}.re{border:1px solid #333;border-radius:10px;padding:8px;background:#151515}.rk{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:1000;font-size:22px;margin-right:6px}.pal{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}.sw{height:28px;border-radius:7px;border:2px solid #333}.sel{border-color:#fff;box-shadow:0 0 0 2px #0b72ff}canvas{display:none}@media(max-width:520px){.sym{font-size:56px}.res{grid-template-columns:1fr 88px}.rulecard{height:90px}.item{grid-template-columns:1.1fr .95fr 1.75fr .5fr}.irule{font-size:17px}.qty{grid-template-columns:38px 38px 40px 38px 38px;gap:3px}.q{font-size:15px}}
</style></head><body><header>照明器具 自動OCR照会記号チェッカー<button class="helpBtn" onclick="openHelp()">？ヘルプ</button></header><div class="wrap">
<div class="mode"><button id="mm" class="on" onclick="setMode('model')">📷 型番読取モード</button><button id="ms" onclick="setMode('symbol')">▣ 照会記号読取モード</button></div><section class="cam"><video id="video" playsinline muted></video><div class="h"></div><div class="v"></div><div class="cor c1"></div><div class="cor c2"></div><div class="cor c3"></div><div class="cor c4"></div><div class="guide" id="guide">型番を十字の中心に合わせてください</div></section>
<section class="res" id="res"><div><div class="state">待機中</div><div class="sym" style="color:#fff">---</div><div class="meta">型番を読ませてください</div></div><div class="rulecard" style="color:#fff"><div class="key">白</div><div class="name">その他</div></div></section>
<div class="actions"><button class="blue" onclick="startAuto()">📷 カメラ起動<br><small>自動読取</small></button><button class="green" onclick="addCurrent()">＋ チェックリストに追加<br><small>数量を+1</small></button><button class="black" onclick="toggleLight()">💡<br>ライト</button></div><div class="actions" style="grid-template-columns:1fr 1fr 1fr"><button class="black" onclick="readOnce()">1回だけ読取</button><button class="red" onclick="stopAll()">■ 停止</button><button class="black" onclick="openHelp()">ルール編集</button></div><div class="status"><span class="dot"></span><span id="status">待機中</span></div>
<section class="head"><h3>チェックリスト（数量管理）</h3><button class="black" onclick="toggleSort()">📅 日付で分類</button></section><div id="list"></div><div class="foot"><button class="black" onclick="document.getElementById('csvFile').click()">📁 CSV読込</button><button class="blue" onclick="exportCsv()">⬇ CSV書き出し</button><input id="csvFile" type="file" accept=".csv,text/csv" style="display:none" onchange="loadCsv(event)"></div><section class="card"><h3>読取文字</h3><div id="raw" class="raw">未読取</div></section></div>
<div id="drawer" class="drawer"><div class="inner"><div style="display:flex;justify-content:space-between;align-items:center"><h2>ヘルプ・ルール設定</h2><button class="black" onclick="closeHelp()">閉じる</button></div><p>照会記号の最後の英字でルール色を判定。最大20個まで編集できます。</p><div id="rules" class="rules"></div><button class="blue" style="width:100%;margin-top:10px" onclick="addRule()">＋ ルールを追加</button><section class="card"><h3>未登録の扱い</h3><p>CSVに型番がない場合は、型番をそのままチェックリストに自動追加できます。</p></section></div></div><canvas id="work"></canvas>
<script>
let data=[{"model": "NNFB84665", "symbol": "E1a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84695", "symbol": "E1a黒", "type": "非常照明", "note": "黒塗装"}, {"model": "NNFB87609", "symbol": "E2a", "type": "非常照明", "note": "LED 15.4W×1"}, {"model": "NNFB84005", "symbol": "E3a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84715", "symbol": "E4a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84105", "symbol": "E6a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "FA40356C LE1", "symbol": "X1L", "type": "避難口誘導灯", "note": "長時間定格型"}, {"model": "FA40352C LE1", "symbol": "X2", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FA40312C LE1", "symbol": "X4", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW42337C LE1", "symbol": "X8u", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FA40366C LE1", "symbol": "Y2L", "type": "通路誘導灯", "note": "両面 B級BH形"}, {"model": "FA01520J", "symbol": "Y9", "type": "客席誘導灯", "note": "LED 1.9W×1"}];let mode='model',stream=null,worker=null,timer=null,busy=false,torch=false,current=null,sortNewest=true;let rules=[{key:'a',name:'一般照明',color:'#ff2020'},{key:'b',name:'非常照明',color:'#1d7cff'},{key:'c',name:'誘導灯',color:'#ffd31a'},{key:'d',name:'ダウンライト',color:'#ff8200'},{key:'e',name:'スポットライト',color:'#42c83f'},{key:'f',name:'ベースライト',color:'#9747ff'},{key:'k',name:'防水（Wp）',color:'#43cde6'},{key:'l',name:'ロング（L）',color:'#7a3f18'},{key:'m',name:'防湿（Wm）',color:'#b08cff'},{key:'n',name:'防雨（Wr）',color:'#00d7c7'},{key:'t',name:'その他',color:'#ffffff'}];const palette=['#ff2020','#1d7cff','#ffd31a','#ff8200','#42c83f','#9747ff','#43cde6','#7a3f18','#b08cff','#00d7c7','#ff6aa8','#bdc050','#3454a3','#999999','#ffffff','#111111','#d66a00','#0a8a2a','#5d6d7e','#ff4f4f'];let checklist=[{date:'2024/05/27',time:'14:35',symbol:'E1a',model:'NNFB84665',qty:23,locked:true},{date:'2024/05/27',time:'14:38',symbol:'E1b',model:'',qty:10,locked:false},{date:'2024/05/27',time:'14:49',symbol:'E1e',model:'',qty:12,locked:false},{date:'2024/05/27',time:'14:45',symbol:'E1d',model:'',qty:8,locked:false},{date:'2024/05/27',time:'14:42',symbol:'E1c',model:'',qty:5,locked:false}];
function setMode(m){mode=m;mm.classList.toggle('on',m==='model');ms.classList.toggle('on',m==='symbol');guide.textContent=m==='model'?'型番を十字の中心に合わせてください':'照会記号を十字の中心に合わせてください'}function norm(s){return(s||'').toUpperCase().replace(/[ＯO]/g,'0').replace(/[ＩIＬ]/g,'1').replace(/[Ｓ]/g,'5').replace(/[Ｂ]/g,'8').replace(/[　\s_.,:;|/\()[\]{}]+/g,'').replace(/[^A-Z0-9\-]/g,'').trim()}function lastA(s){let m=String(s||'').toLowerCase().match(/[a-z](?!.*[a-z])/);return m?m[0]:'t'}function ruleFor(s){let k=lastA(s);return rules.find(r=>r.key.toLowerCase()===k)||rules.find(r=>r.key==='t')||{key:'t',name:'その他',color:'#fff'}}function sim(a,b){a=norm(a);b=norm(b);let m=a.length,n=b.length;if(!m||!n)return 0;let d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){let c=a[i-1]==b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c)}return 1-d[m][n]/Math.max(m,n)}function matchModel(t){let j=norm(t);for(const r of data){let m=norm(r.model);if(j.includes(m)||m.includes(j))return{hit:r,cand:r.model,score:1}}let best={hit:null,cand:j,score:0};let chunks=[j,...(j.match(/[A-Z]{1,}[A-Z0-9\-]{4,}/g)||[])];for(const r of data){let m=norm(r.model);for(const c of chunks){if(c.length<5)continue;let s=sim(c,m);if(s>best.score)best={hit:r,cand:c,score:s}}}return best.score>=.72?best:{hit:null,cand:j,score:best.score}}function matchSymbol(t){let j=norm(t);let m=j.match(/[A-Z]{1,3}\d{0,3}[A-Z]?/);let cand=m?m[0]:j;let hit=data.find(r=>norm(r.symbol)===cand);return{hit,cand,score:hit?1:.7}}
async function ensureWorker(){if(worker)return worker;status.textContent='OCR準備中...';worker=await Tesseract.createWorker('eng',1);await worker.setParameters({tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- ',tessedit_pageseg_mode:'6'});return worker}async function startAuto(){await startCam();if(timer)clearInterval(timer);timer=setInterval(readOnce,900);readOnce()}async function startCam(){if(stream)return;stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream;await video.play();await ensureWorker();status.textContent='自動読取中'}function stopAll(){if(timer)clearInterval(timer);timer=null;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;status.textContent='停止中'}async function toggleLight(){if(!stream)return alert('先にカメラ起動');let tr=stream.getVideoTracks()[0],cap=tr.getCapabilities?.();if(!cap||!cap.torch)return alert('ライト制御非対応です');torch=!torch;await tr.applyConstraints({advanced:[{torch}]})}function crop(){if(!video.videoWidth)return null;let sw=video.videoWidth*.92,sh=video.videoHeight*.45,sx=video.videoWidth*.04,sy=video.videoHeight*.28;let scale=1100/sw,cw=1100,ch=Math.max(260,Math.floor(sh*scale));let c=work;c.width=cw;c.height=ch;let ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(video,sx,sy,sw,sh,0,0,cw,ch);let img=ctx.getImageData(0,0,c.width,c.height),d=img.data,sum=0;for(let i=0;i<d.length;i+=4){let g=.299*d[i]+.587*d[i+1]+.114*d[i+2];g=(g-128)*1.75+128;g=Math.max(0,Math.min(255,g));sum+=g;d[i]=d[i+1]=d[i+2]=g}let th=Math.max(90,Math.min(190,(sum/(d.length/4))*.94));for(let i=0;i<d.length;i+=4){let v=d[i]>th?255:0;d[i]=d[i+1]=d[i+2]=v}ctx.putImageData(img,0,0);return c}async function readOnce(){if(busy||!stream)return;busy=true;try{let c=crop();let w=await ensureWorker();let r=await w.recognize(c);let text=r.data.text||'';let m=mode==='model'?matchModel(text):matchSymbol(text);raw.textContent='OCR文字:
'+text+'
候補:'+m.cand+'
一致率:'+Math.round(m.score*100)+'%';m.hit?showHit(m.hit,m.score):showMissing(m.cand,m.score)}finally{busy=false}}
function showHit(h,score){let ru=ruleFor(h.symbol);current={model:h.model,symbol:h.symbol,missing:false};res.style.borderColor=ru.color;res.innerHTML='<div><div class="state">✅ 照合一致</div><div class="sym" style="color:'+ru.color+'">'+esc(h.symbol)+'</div><div class="meta">型番：<b>'+esc(h.model)+'</b><br>一致率：'+Math.round(score*100)+'%</div></div><div class="rulecard" style="color:'+ru.color+'"><div class="key">'+esc(ru.key)+'</div><div class="name">'+esc(ru.name)+'</div></div>';status.textContent=h.model+' → '+h.symbol}function showMissing(cand,score){current={model:cand,symbol:cand,missing:true};res.style.borderColor='#fff';res.innerHTML='<div><div class="state">未登録</div><div class="sym" style="color:#fff;font-size:42px">'+esc(cand||'未登録')+'</div><div class="meta">CSVに型番なし<br>型番で追加できます</div></div><div class="rulecard" style="color:#fff"><div class="key">白</div><div class="name">その他</div></div>';status.textContent='未登録：'+cand}function addCurrent(){if(!current)return alert('先に読取してください');let now=new Date(),date=now.toISOString().slice(0,10).replaceAll('-','/'),time=now.toTimeString().slice(0,5);let ex=checklist.find(x=>x.date===date&&x.symbol===current.symbol);if(ex&&!ex.locked)ex.qty++;else checklist.unshift({date,time,symbol:current.symbol,model:current.model,qty:1,locked:false,missing:current.missing});renderList()}function chg(i,d){if(checklist[i].locked)return;checklist[i].qty=Math.max(0,checklist[i].qty+d);renderList()}function lock(i){checklist[i].locked=!checklist[i].locked;renderList()}function toggleSort(){sortNewest=!sortNewest;renderList()}function renderList(){let arr=[...checklist].sort((a,b)=>sortNewest?(b.date+b.time).localeCompare(a.date+a.time):(a.date+a.time).localeCompare(b.date+b.time));let gp={};arr.forEach(x=>{x._idx=checklist.indexOf(x);(gp[x.date]||(gp[x.date]=[])).push(x)});let h='';Object.keys(gp).forEach(d=>{let a=gp[d],total=a.reduce((s,x)=>s+x.qty,0);h+='<div class="date"><div class="dt"><span>⌄ '+d+'（'+a.length+'件）</span><span>合計数量：'+total+'</span></div>';a.forEach(x=>{let ru=ruleFor(x.symbol);let sym=x.missing?'<span class="tiger">'+esc(x.symbol)+'</span>':'<span class="isym" style="color:'+ru.color+'">'+esc(x.symbol)+'</span>';h+='<div class="item"><div>'+sym+'</div><div class="irule" style="color:'+ru.color+'">'+esc(ru.name)+'</div><div class="qty"><button class="q minus" onclick="chg('+x._idx+',-10)">-10</button><button class="q minus" onclick="chg('+x._idx+',-1)">-1</button><div class="num">'+x.qty+'</div><button class="q plus" onclick="chg('+x._idx+',1)">+1</button><button class="q plus" onclick="chg('+x._idx+',10)">+10</button></div><div><button class="lock '+(x.locked?'locked':'')+'" onclick="lock('+x._idx+')">🔒</button></div></div>'});h+='</div>'});list.innerHTML=h}
function openHelp(){renderRules();drawer.style.display='block'}function closeHelp(){drawer.style.display='none';renderList()}function addRule(){if(rules.length>=20)return alert('最大20個です');rules.push({key:'',name:'新規ルール',color:palette[rules.length%palette.length]});renderRules()}function renderRules(){let h='';rules.forEach((r,i)=>{h+='<div class="re"><div><span class="rk" style="background:'+r.color+';color:'+(r.color=='#ffffff'?'#111':'#fff')+'">'+esc(r.key||'?')+'</span><input value="'+esc(r.name)+'" onchange="rules['+i+'].name=this.value"></div><input value="'+esc(r.key)+'" maxlength="2" onchange="rules['+i+'].key=this.value.toLowerCase()"><div class="pal">'+palette.map(c=>'<div class="sw '+(c==r.color?'sel':'')+'" style="background:'+c+'" onclick="rules['+i+'].color=''+c+'';renderRules()"></div>').join('')+'</div></div>'});rules.innerHTML=h}function split(line){let out=[],cur='',q=false;for(let i=0;i<line.length;i++){let c=line[i],nx=line[i+1];if(c=='"'&&q&&nx=='"'){cur+='"';i++}else if(c=='"')q=!q;else if(c==','&&!q){out.push(cur);cur=''}else cur+=c}out.push(cur);return out}function loadCsv(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let lines=r.result.replace(//g,'').split('
').filter(x=>x.trim()),hs=split(lines[0]).map(x=>x.trim());data=lines.slice(1).map(line=>{let c=split(line),row={};hs.forEach((k,i)=>row[k]=c[i]||'');return{model:row['型番']||row.model||'',symbol:row['照会記号']||row['紹介記号']||row.symbol||'',type:row['器具種別']||'',note:row['備考']||''}}).filter(x=>x.model&&x.symbol);alert(data.length+'件読み込みました')};r.readAsText(f,'utf-8')}function exportCsv(){let lines=['日付,時刻,照会記号,型番,数量,固定'];checklist.forEach(x=>lines.push([x.date,x.time,x.symbol,x.model,x.qty,x.locked?'固定':''].map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')));let blob=new Blob(['﻿'+lines.join('
')],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='checklist.csv';a.click()}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}renderList();
</script></body></html>
