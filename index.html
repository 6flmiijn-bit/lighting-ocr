<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>照明器具 自動OCR照会記号チェッカー</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#050505;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{height:48px;background:#080808;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;border-bottom:1px solid #222;position:sticky;top:0;z-index:5}
.wrap{padding:10px;max-width:760px;margin:auto}
.modebar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
button{border:0;border-radius:12px;padding:13px 8px;color:white;font-size:16px;font-weight:900}
.mode{background:#111;border:1px solid #333}.mode.on{background:#0967dc}
.cam{position:relative;border:2px solid #19d66b;border-radius:14px;overflow:hidden;background:#000;margin-bottom:8px}
video{display:block;width:100%;height:31vh;object-fit:cover;background:#000}
.h{position:absolute;left:0;right:0;top:50%;height:1px;background:#7fff90;box-shadow:0 0 8px #7fff90}
.v{position:absolute;top:0;bottom:0;left:50%;width:1px;background:#7fff90;box-shadow:0 0 8px #7fff90}
.c{position:absolute;width:34px;height:34px;border-color:#fff}
.c1{left:18px;top:18px;border-left:4px solid;border-top:4px solid}.c2{right:18px;top:18px;border-right:4px solid;border-top:4px solid}
.c3{left:18px;bottom:18px;border-left:4px solid;border-bottom:4px solid}.c4{right:18px;bottom:18px;border-right:4px solid;border-bottom:4px solid}
.guide{position:absolute;left:10%;right:10%;bottom:14px;background:#000a;border-radius:999px;text-align:center;padding:7px;font-weight:800}
.result{display:grid;grid-template-columns:1fr 96px;gap:8px;background:linear-gradient(#0d1824,#07111b);border:2px solid #24394f;border-radius:16px;padding:14px;margin-bottom:8px}
.state{color:#35ff91;font-weight:900;font-size:18px}.sym{font-size:58px;font-weight:1000;line-height:1}.meta{font-size:17px;line-height:1.5}
.rulebox{border:2px solid currentColor;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}.rulekey{font-size:38px}.rulename{font-size:14px}
.actions{display:grid;grid-template-columns:1fr 1.7fr .7fr;gap:8px;margin:8px 0}
.blue{background:#0967dc}.green{background:#079b37}.red{background:#ae1515}.black{background:#111;border:1px solid #333}.gray{background:#333}
.status{display:flex;gap:8px;align-items:center;margin:6px 0;color:#ccc}.dot{width:13px;height:13px;border-radius:50%;background:#1ed760}
.checktop{display:flex;justify-content:space-between;align-items:center;background:#101010;border:1px solid #333;border-radius:12px;padding:10px;margin-top:10px}.checktop h3{margin:0;font-size:20px}
.date{border:1px solid #1e4268;border-radius:12px;overflow:hidden;margin-top:8px;background:#080808}.datet{display:flex;justify-content:space-between;background:#07325c;padding:10px 12px;font-size:18px;font-weight:900}
.item{display:grid;grid-template-columns:1.25fr 1fr 1.7fr .55fr;align-items:center;border-top:1px solid #333;min-height:58px}
.item>div{padding:7px;border-left:1px solid #222}.item>div:first-child{border-left:0}
.isym{font-size:30px;font-weight:1000}.irule{font-size:18px;font-weight:900}
.qty{display:grid;grid-template-columns:38px 38px 42px 38px 38px;gap:3px;align-items:center;justify-content:center}
.q{padding:7px 0;border-radius:7px;background:#111;border:1px solid #333;font-size:15px}.minus{color:#ff3333;border-color:#8a2222}.plus{color:#248dff;border-color:#1e5a9f}.num{font-size:24px;font-weight:900;text-align:center}
.lock{font-size:22px;padding:8px;background:#111;border:1px solid #555}.locked{color:#ffd400;border-color:#ffd400}
.foot{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.card{background:#101010;border:1px solid #333;border-radius:14px;padding:12px;margin-top:10px}.raw{white-space:pre-wrap;background:#080808;border-radius:10px;padding:8px;font-size:12px;color:#bbb;max-height:90px;overflow:auto}
.fileInput{display:block;width:100%;background:#fff;color:#111;border-radius:10px;padding:12px;margin-top:8px}
.tiger{background:repeating-linear-gradient(135deg,#ffd400 0 12px,#000 12px 24px)!important;color:#000!important;text-shadow:0 1px 0 #fff;border-radius:8px;padding:5px 6px;font-weight:1000;display:inline-block}
.drawer{display:none;position:fixed;inset:0;background:#000c;z-index:30}.inner{position:absolute;right:0;top:0;bottom:0;width:min(430px,96vw);background:#101010;border-left:1px solid #333;overflow:auto;padding:14px}
.rules{display:grid;grid-template-columns:1fr 1fr;gap:8px}.redit{border:1px solid #333;border-radius:10px;padding:8px;background:#151515}input{width:100%;padding:10px;border:0;border-radius:8px;margin:4px 0}
.rkey{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:1000}.colors{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.sw{height:30px;border-radius:7px;border:2px solid #333}.sel{border-color:#fff}
canvas{display:none}
</style>
</head>
<body>
<header>照明器具 自動OCR照会記号チェッカー <button class="black" onclick="openHelp()" style="position:absolute;right:8px;padding:7px 10px;font-size:13px">？</button></header>
<div class="wrap">
<div class="modebar"><button id="m1" class="mode on" onclick="setMode('model')">📷 型番読取モード</button><button id="m2" class="mode" onclick="setMode('symbol')">▣ 照会記号読取モード</button></div>
<section class="cam"><video id="video" playsinline muted></video><div class="h"></div><div class="v"></div><div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div><div id="guide" class="guide">型番を十字の中心に合わせてください</div></section>
<section class="result" id="res"><div><div class="state">待機中</div><div class="sym" style="color:white">---</div><div class="meta">型番を読ませてください</div></div><div class="rulebox" style="color:white"><div class="rulekey">白</div><div class="rulename">その他</div></div></section>
<div class="actions"><button class="blue" onclick="startAuto()">📷 カメラ起動<br><small>自動読取</small></button><button class="green" onclick="addCurrent()">＋ チェックリストに追加<br><small>数量を+1</small></button><button class="black" onclick="toggleLight()">💡<br>ライト</button></div>
<div class="actions" style="grid-template-columns:1fr 1fr 1fr"><button class="black" onclick="readOnce()">1回だけ読取</button><button class="red" onclick="stopAll()">■ 停止</button><button class="black" onclick="openHelp()">ルール編集</button></div>
<div class="status"><span class="dot"></span><span id="status">待機中</span></div>
<section class="checktop"><h3>チェックリスト</h3><button class="black" onclick="toggleSort()">📅 日付で分類</button></section>
<div id="list"></div>
<div class="foot"><button class="blue" onclick="exportCsv()">⬇ CSV書き出し</button><button class="black" onclick="clearList()">リストクリア</button></div>
<section class="card"><b>CSV読込</b><input class="fileInput" type="file" accept=".csv,text/csv" onchange="loadCsv(event)"></section>
<section class="card"><b>読取文字</b><div id="raw" class="raw">未読取</div></section>
</div>
<div id="drawer" class="drawer"><div class="inner"><div style="display:flex;justify-content:space-between"><h2>ルール設定</h2><button class="black" onclick="closeHelp()">閉じる</button></div><p>照会記号の最後の英字で判定。最大20個まで編集できます。</p><div id="rules" class="rules"></div><button class="blue" style="width:100%;margin-top:10px" onclick="addRule()">＋ ルール追加</button></div></div>
<canvas id="work"></canvas>
<script>
let data=[{"model": "NNFB84665", "symbol": "E1a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84695", "symbol": "E1a黒", "type": "非常照明", "note": "LED 6.6W×1 黒塗装"}, {"model": "NNFB87609", "symbol": "E2a", "type": "非常照明", "note": "LED 15.4W×1"}, {"model": "NNFB87649", "symbol": "E2a黒", "type": "非常照明", "note": "LED 15.4W×1 黒塗装"}, {"model": "NNFB84005", "symbol": "E3a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84045", "symbol": "E3a黒", "type": "非常照明", "note": "LED 6.6W×1 黒塗装"}, {"model": "NNFB84715", "symbol": "E4a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNLG01509", "symbol": "E5a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB84105", "symbol": "E6a", "type": "非常照明", "note": "LED 6.6W×1"}, {"model": "NNFB87009", "symbol": "E7a", "type": "非常照明", "note": "LED 15.4W×1"}, {"model": "NNFB87049", "symbol": "E7a黒", "type": "非常照明", "note": "LED 15.4W×1 黒塗装"}, {"model": "NNFB87109", "symbol": "E8a", "type": "非常照明", "note": "LED 15.4W×1"}, {"model": "NNFB87919", "symbol": "E9a", "type": "非常照明", "note": "LED 15.4W×1"}, {"model": "FSK90910K", "symbol": "自己点検リモコン", "type": "リモコン", "note": "自己点検用"}, {"model": "FA40356C LE1", "symbol": "X1L", "type": "避難口誘導灯", "note": "片面 B級BH形 長時間定格型"}, {"model": "FA40352C LE1", "symbol": "X2", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FA40316C LE1", "symbol": "X3L", "type": "避難口誘導灯", "note": "片面 B級BH形 長時間定格型"}, {"model": "FA40312C LE1", "symbol": "X4", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW42317C", "symbol": "X5Lu", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW42317C", "symbol": "X6u", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW42317C LE1", "symbol": "X7u", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW42337C LE1", "symbol": "X8u", "type": "避難口誘導灯", "note": "片面 B級BH形"}, {"model": "FW40315 LE1", "symbol": "X9L", "type": "避難口誘導灯", "note": "両面 B級BH形"}, {"model": "FW42327C LE1", "symbol": "X10u", "type": "避難口誘導灯", "note": "壁付型 防雨・防湿"}, {"model": "FA40356C LE1", "symbol": "Y1L", "type": "通路誘導灯", "note": "片面 B級BH形 長時間定格型"}, {"model": "FA40366C LE1", "symbol": "Y2L", "type": "通路誘導灯", "note": "両面 B級BH形 長時間定格型"}, {"model": "FA40352C LE1", "symbol": "Y3", "type": "通路誘導灯", "note": "片面 B級BH形"}, {"model": "FA40362C LE1", "symbol": "Y4", "type": "通路誘導灯", "note": "両面 B級BH形"}, {"model": "FA40312C LE1", "symbol": "Y5", "type": "通路誘導灯", "note": "片面 B級BH形"}, {"model": "FA40322C LE1", "symbol": "Y6", "type": "通路誘導灯", "note": "両面 B級BH形"}, {"model": "FW42317C LE1", "symbol": "Y7u", "type": "通路誘導灯", "note": "片面 B級BH形"}, {"model": "FW42337C LE1", "symbol": "Y8u", "type": "通路誘導灯", "note": "片面 B級BH形"}, {"model": "FA01520J", "symbol": "Y9", "type": "客席誘導灯", "note": "LED 1.9W×1"}];
let rules=[{key:"a",name:"一般照明",color:"#ff2020"},{key:"b",name:"非常照明",color:"#1d7cff"},{key:"c",name:"誘導灯",color:"#ffd31a"},{key:"d",name:"ダウンライト",color:"#ff8200"},{key:"e",name:"スポットライト",color:"#42c83f"},{key:"f",name:"ベースライト",color:"#9747ff"},{key:"k",name:"防水(Wp)",color:"#43cde6"},{key:"l",name:"ロング(L)",color:"#7a3f18"},{key:"t",name:"その他",color:"#ffffff"}];
let palette=["#ff2020","#1d7cff","#ffd31a","#ff8200","#42c83f","#9747ff","#43cde6","#7a3f18","#b08cff","#00d7c7","#ff6aa8","#bdc050","#3454a3","#999999","#ffffff","#111111","#d66a00","#0a8a2a","#5d6d7e","#ff4f4f"];
let checklist=[],current=null,mode="model",stream=null,worker=null,timer=null,busy=false,torch=false,sortNewest=true;

function setMode(m){mode=m;m1.classList.toggle("on",m=="model");m2.classList.toggle("on",m=="symbol");guide.textContent=m=="model"?"型番を十字の中心に合わせてください":"照会記号を十字の中心に合わせてください"}
function norm(s){return(s||"").toUpperCase().replace(/[ＯO]/g,"0").replace(/[ＩIＬ]/g,"1").replace(/[　\s_.,:;|/\\()[\]{}]+/g,"").replace(/[^A-Z0-9\-]/g,"").trim()}
function lastA(s){let m=String(s||"").toLowerCase().match(/[a-z](?!.*[a-z])/);return m?m[0]:"t"}
function ruleFor(s){let k=lastA(s);return rules.find(r=>r.key.toLowerCase()==k)||rules.find(r=>r.key=="t")||{key:"t",name:"その他",color:"#fff"}}
function sim(a,b){a=norm(a);b=norm(b);let m=a.length,l=b.length;if(!m||!l)return 0;let d=Array.from({length:m+1},()=>Array(l+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=l;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=l;j++){let c=a[i-1]==b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c)}return 1-d[m][l]/Math.max(m,l)}
function matchModel(text){let joined=norm(text);for(const r of data){let m=norm(r.model);if(joined.includes(m)||m.includes(joined))return{hit:r,cand:r.model,score:1}}let best={hit:null,cand:joined,score:0};let chunks=[joined,...(joined.match(/[A-Z]{1,}[A-Z0-9\-]{4,}/g)||[])];for(const r of data){let m=norm(r.model);for(const c of chunks){if(c.length<5)continue;let s=sim(c,m);if(s>best.score)best={hit:r,cand:c,score:s}}}if(best.score>=0.72)return best;return{hit:null,cand:joined,score:best.score}}
function matchSymbol(text){let joined=norm(text);let m=joined.match(/[A-Z]{1,3}\d{0,3}[A-Z]?/);let cand=m?m[0]:joined;let hit=data.find(r=>norm(r.symbol)==cand);return{hit,cand,score:hit?1:0.7}}
async function ensureWorker(){if(worker)return worker;status.textContent="OCR準備中";worker=await Tesseract.createWorker("eng",1);await worker.setParameters({tessedit_char_whitelist:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- ",tessedit_pageseg_mode:"6"});status.textContent="OCR準備完了";return worker}
async function startAuto(){await startCam();if(timer)clearInterval(timer);timer=setInterval(readOnce,900);readOnce()}
async function startCam(){if(stream)return;stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream;await video.play();await ensureWorker();status.textContent="自動読取中"}
function stopAll(){if(timer)clearInterval(timer);timer=null;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;status.textContent="停止中"}
async function toggleLight(){if(!stream)return alert("先にカメラ起動");let track=stream.getVideoTracks()[0],cap=track.getCapabilities?.();if(!cap||!cap.torch)return alert("ライト制御非対応です");torch=!torch;await track.applyConstraints({advanced:[{torch}]})}
function crop(){if(!video.videoWidth)return null;let sw=video.videoWidth*.92,sh=video.videoHeight*.45,sx=video.videoWidth*.04,sy=video.videoHeight*.28;let c=work,scale=1100/sw;c.width=1100;c.height=Math.max(260,Math.floor(sh*scale));let ctx=c.getContext("2d",{willReadFrequently:true});ctx.drawImage(video,sx,sy,sw,sh,0,0,c.width,c.height);return c}
async function readOnce(){if(busy||!stream)return;busy=true;try{let c=crop();if(!c)return;let w=await ensureWorker();let r=await w.recognize(c);let text=r.data.text||"";let m=mode=="model"?matchModel(text):matchSymbol(text);raw.textContent="OCR文字:\n"+text+"\n候補:"+m.cand+"\n一致率:"+Math.round(m.score*100)+"%";if(m.hit)showHit(m.hit,m.score);else showMissing(m.cand,m.score)}catch(e){status.textContent="エラー:"+e.message}finally{busy=false}}
function showHit(hit,score){let rule=ruleFor(hit.symbol);current={model:hit.model,symbol:hit.symbol,missing:false};res.style.borderColor=rule.color;res.innerHTML='<div><div class="state">✅ 照合一致</div><div class="sym" style="color:'+rule.color+'">'+esc(hit.symbol)+'</div><div class="meta">型番：<b>'+esc(hit.model)+'</b><br>一致率：'+Math.round(score*100)+'%</div></div><div class="rulebox" style="color:'+rule.color+'"><div class="rulekey">'+esc(rule.key)+'</div><div class="rulename">'+esc(rule.name)+'</div></div>';status.textContent=hit.model+" → "+hit.symbol}
function showMissing(cand,score){current={model:cand,symbol:cand,missing:true};res.style.borderColor="#fff";res.innerHTML='<div><div class="state">未登録</div><div class="sym" style="font-size:38px;color:#fff">'+esc(cand||"未登録")+'</div><div class="meta">型番をそのまま追加できます</div></div><div class="rulebox" style="color:#fff"><div class="rulekey">白</div><div class="rulename">その他</div></div>';status.textContent="未登録:"+cand}
function addCurrent(){if(!current)return alert("先に読取してください");let d=new Date(),date=d.toISOString().slice(0,10).replaceAll("-","/"),time=d.toTimeString().slice(0,5);let ex=checklist.find(x=>x.date==date&&x.symbol==current.symbol);if(ex&&!ex.locked)ex.qty++;else checklist.unshift({date,time,symbol:current.symbol,model:current.model,qty:1,locked:false,missing:current.missing});renderList()}
function changeQty(i,d){if(checklist[i].locked)return;checklist[i].qty=Math.max(0,checklist[i].qty+d);renderList()}
function toggleLock(i){checklist[i].locked=!checklist[i].locked;renderList()}
function toggleSort(){sortNewest=!sortNewest;renderList()}
function renderList(){let list=[...checklist].sort((a,b)=>sortNewest?(b.date+b.time).localeCompare(a.date+a.time):(a.date+a.time).localeCompare(b.date+b.time));let groups={};list.forEach(x=>{x._i=checklist.indexOf(x);(groups[x.date]||(groups[x.date]=[])).push(x)});let html="";Object.keys(groups).forEach(date=>{let arr=groups[date],total=arr.reduce((s,x)=>s+x.qty,0);html+='<div class="date"><div class="datet"><span>'+date+'（'+arr.length+'件）</span><span>合計:'+total+'</span></div>';arr.forEach(x=>{let rule=ruleFor(x.symbol);let sym=x.missing?'<span class="tiger">'+esc(x.symbol)+'</span>':'<span class="isym" style="color:'+rule.color+'">'+esc(x.symbol)+'</span>';html+='<div class="item"><div>'+sym+'</div><div class="irule" style="color:'+rule.color+'">'+esc(rule.name)+'</div><div class="qty"><button class="q minus" onclick="changeQty('+x._i+',-10)">-10</button><button class="q minus" onclick="changeQty('+x._i+',-1)">-1</button><div class="num">'+x.qty+'</div><button class="q plus" onclick="changeQty('+x._i+',1)">+1</button><button class="q plus" onclick="changeQty('+x._i+',10)">+10</button></div><div><button class="lock '+(x.locked?'locked':'')+'" onclick="toggleLock('+x._i+')">🔒</button></div></div>'});html+='</div>'});list.innerHTML=html}
function clearList(){if(confirm("チェックリストを消しますか？")){checklist=[];renderList()}}
function exportCsv(){let lines=["日付,時刻,照会記号,型番,数量,固定"];checklist.forEach(x=>lines.push([x.date,x.time,x.symbol,x.model,x.qty,x.locked?"固定":""].map(v=>'"'+String(v).replaceAll('"','""')+'"').join(",")));let blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="checklist.csv";a.click()}
function loadCsv(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let rows=parseCsv(r.result);if(rows.length){data=rows;alert(rows.length+"件読み込みました")}else alert("CSV読込失敗")};r.readAsText(f,"utf-8")}
function parseCsv(t){let lines=t.replace(/\r/g,"").split("\n").filter(x=>x.trim());if(lines.length<2)return[];let h=split(lines[0]).map(x=>x.trim());return lines.slice(1).map(line=>{let c=split(line),row={};h.forEach((k,i)=>row[k]=c[i]||"");return{model:row["型番"]||row["model"]||"",symbol:row["照会記号"]||row["紹介記号"]||row["symbol"]||row["記号"]||"",type:row["器具種別"]||"",note:row["備考"]||""}}).filter(r=>r.model&&r.symbol)}
function split(line){let out=[],cur="",q=false;for(let i=0;i<line.length;i++){let c=line[i],nx=line[i+1];if(c=='"'&&q&&nx=='"'){cur+='"';i++}else if(c=='"')q=!q;else if(c==","&&!q){out.push(cur);cur=""}else cur+=c}out.push(cur);return out}
function openHelp(){renderRules();drawer.style.display="block"}
function closeHelp(){drawer.style.display="none";renderList()}
function addRule(){if(rules.length>=20)return alert("最大20個です");rules.push({key:"",name:"新規",color:palette[rules.length%palette.length]});renderRules()}
function renderRules(){let html="";rules.forEach((r,i)=>{html+='<div class="redit"><div style="display:flex;gap:6px;align-items:center"><span class="rkey" style="background:'+r.color+';color:'+(r.color=="#ffffff"?"#111":"#fff")+'">'+esc(r.key||"?")+'</span><input value="'+esc(r.name)+'" onchange="rules['+i+'].name=this.value"></div><input value="'+esc(r.key)+'" maxlength="2" onchange="rules['+i+'].key=this.value.toLowerCase()"><div class="colors">'+palette.map(c=>'<div class="sw '+(c==r.color?'sel':'')+'" style="background:'+c+'" onclick="rules['+i+'].color=\''+c+'\';renderRules()"></div>').join("")+'</div></div>'});rules.innerHTML=html}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
renderList();
</script>
</body>
</html>
